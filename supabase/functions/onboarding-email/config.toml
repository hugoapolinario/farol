# verify_jwt = false: invoked by pg_cron (net.http_post) with project anon key, no user JWT.
# Optional: set ONBOARDING_EMAIL_SECRET and require header x-onboarding-secret (pg_cron must send the same;
# e.g. store in Vault like weekly-digest, then add the header in net.http_post).
[functions.onboarding-email]
verify_jwt = false
