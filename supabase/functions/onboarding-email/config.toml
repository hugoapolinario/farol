# verify_jwt = false: invoked by pg_cron (net.http_post) with project anon key, no user JWT.
# Required: ONBOARDING_EMAIL_SECRET (Edge secret) and matching vault secret onboarding_email_secret in pg_cron headers.
# See migration 20260502120000_onboarding_email_cron_secret_header.sql.
[functions.onboarding-email]
verify_jwt = false
