<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Send feedback — Farol</title>
  <meta name="description" content="Share bugs, ideas, or general feedback with the Farol team." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c0f;
      --bg-surface: #111318;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --text-muted: #8b919d;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.14);
      --accent-glow: rgba(249, 115, 22, 0.35);
      --danger: #f87171;
      --font-display: "Fraunces", Georgia, serif;
      --font-sans: "IBM Plex Sans", system-ui, sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
      --max: 1120px;
      --nav-h: 72px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--bg-deep);
      color-scheme: dark;
      -webkit-font-smoothing: antialiased;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 40%, rgba(249, 115, 22, 0.06), transparent 50%),
        var(--bg-deep);
    }

    .wrap {
      width: min(100% - 2rem, var(--max));
      margin-inline: auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      border-bottom: 1px solid var(--border);
      background: rgba(10, 12, 15, 0.78);
      backdrop-filter: blur(12px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--nav-h);
      gap: 1rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 1.125rem;
      letter-spacing: -0.02em;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      color: #0a0c0f;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .nav-link:hover { color: var(--text); }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1.25rem;
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      text-decoration: none;
      background: var(--accent);
      color: #0a0c0f;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .nav-cta:hover {
      background: #fb923c;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0c0f;
    }

    .btn-primary:hover {
      background: #fb923c;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    main {
      padding: clamp(2.5rem, 6vw, 4rem) 0 4rem;
    }

    .feedback-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .feedback-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.5rem, 4vw, 2rem);
    }

    .feedback-title {
      font-family: var(--font-display);
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
    }

    .feedback-sub {
      margin: 0 0 1.75rem;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.65rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 520px) {
      .category-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .category-tile {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .category-tile:hover {
      border-color: rgba(249, 115, 22, 0.35);
      background: rgba(249, 115, 22, 0.06);
    }

    .category-tile.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.25);
    }

    .category-tile span.emoji { font-size: 1.15rem; line-height: 1; }
    .category-tile span.label { font-weight: 600; }

    .field {
      margin-bottom: 1.15rem;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #0a0c0f;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.85;
    }

    .field input:focus,
    .field textarea:focus {
      outline: 2px solid rgba(249, 115, 22, 0.45);
      outline-offset: 0;
      border-color: rgba(249, 115, 22, 0.5);
    }

    .field textarea {
      min-height: 140px;
      resize: vertical;
    }

    .field-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin: 0.35rem 0 0;
    }

    .btn-submit {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.75rem 1.25rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #0a0c0f;
      transition: background 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn-submit:hover:not(:disabled) {
      background: #fb923c;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    .btn-submit:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .form-error {
      display: none;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius-sm);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: var(--danger);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .form-error.visible { display: block; }

    .success-panel {
      text-align: center;
      padding: 1rem 0 0.5rem;
    }

    .success-check {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      display: grid;
      place-items: center;
      color: var(--accent);
    }

    .success-check svg {
      width: 26px;
      height: 26px;
    }

    .success-text {
      font-size: 1.05rem;
      color: var(--text);
      margin: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap nav-inner">
      <a class="logo" href="/" aria-label="Farol home">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <path d="M12 3L4 9v12h16V9l-8-6z" />
            <path d="M9 21V12h6v9" />
            <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none" />
          </svg>
        </span>
        Farol
      </a>
      <div class="nav-links">
        <a href="/docs" class="nav-link">Docs</a>
        <a href="/demo" class="nav-link">View demo</a>
        <a href="/login" class="nav-link">Log in</a>
        <a href="/signup" class="nav-cta">Get started</a>
      </div>
    </div>
  </header>

  <main>
    <div class="feedback-shell">
      <div class="feedback-card">
        <div id="feedback-form-wrap">
          <h1 class="feedback-title">Send feedback</h1>
          <p class="feedback-sub">Found a bug? Have an idea? We read everything.</p>

          <div id="form-error" class="form-error" role="alert"></div>

          <form id="feedback-form" novalidate>
            <input type="hidden" name="category" id="field-category" value="bug" />

            <div class="field" style="margin-top:0">
              <span style="display:block;font-size:0.8125rem;font-weight:600;color:var(--text-muted);margin-bottom:0.5rem">Category</span>
              <div class="category-grid" role="group" aria-label="Feedback category">
                <button type="button" class="category-tile selected" data-category="bug" aria-pressed="true">
                  <span class="emoji" aria-hidden="true">🐛</span>
                  <span class="label">Bug report</span>
                </button>
                <button type="button" class="category-tile" data-category="feature" aria-pressed="false">
                  <span class="emoji" aria-hidden="true">✨</span>
                  <span class="label">Feature request</span>
                </button>
                <button type="button" class="category-tile" data-category="general" aria-pressed="false">
                  <span class="emoji" aria-hidden="true">💬</span>
                  <span class="label">General feedback</span>
                </button>
              </div>
            </div>

            <div class="field">
              <label for="field-subject">Subject</label>
              <input id="field-subject" name="subject" type="text" autocomplete="off" placeholder="Brief summary" required />
            </div>

            <div class="field">
              <label for="field-message">Message</label>
              <textarea id="field-message" name="message" placeholder="Tell us more..." required></textarea>
            </div>

            <div class="field">
              <label for="field-email">Email <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
              <input id="field-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
              <p class="field-hint">Adding an email helps us follow up — we recommend it.</p>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Send feedback</button>
          </form>
        </div>

        <div id="success-panel" class="success-panel" hidden aria-live="polite">
          <div class="success-check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5" />
            </svg>
          </div>
          <p class="success-text">Thanks for your feedback! We'll get back to you soon.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (function () {
      const form = document.getElementById("feedback-form");
      const formWrap = document.getElementById("feedback-form-wrap");
      const successPanel = document.getElementById("success-panel");
      const errEl = document.getElementById("form-error");
      const submitBtn = document.getElementById("submit-btn");
      const categoryInput = document.getElementById("field-category");
      const tiles = document.querySelectorAll(".category-tile");

      tiles.forEach(function (tile) {
        tile.addEventListener("click", function () {
          const cat = tile.getAttribute("data-category");
          categoryInput.value = cat;
          tiles.forEach(function (t) {
            t.classList.toggle("selected", t === tile);
            t.setAttribute("aria-pressed", t === tile ? "true" : "false");
          });
        });
      });

      (async function prefillEmail() {
        if (!window.SUPABASE_URL || !window.SUPABASE_KEY || typeof supabase === "undefined") return;
        const { createClient } = supabase;
        const client = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
        const { data: { session } } = await client.auth.getSession();
        if (session && session.user && session.user.email) {
          document.getElementById("field-email").value = session.user.email;
        }
      })();

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        errEl.textContent = "";
        errEl.classList.remove("visible");

        var subject = document.getElementById("field-subject").value.trim();
        var message = document.getElementById("field-message").value.trim();
        var email = document.getElementById("field-email").value.trim();
        var category = categoryInput.value;

        if (!subject || !message) {
          errEl.textContent = "Please fill in subject and message.";
          errEl.classList.add("visible");
          return;
        }

        if (!window.SUPABASE_URL) {
          errEl.textContent = "Configuration error: missing API URL.";
          errEl.classList.add("visible");
          return;
        }

        var url = window.SUPABASE_URL.replace(/\/$/, "") + "/functions/v1/send-feedback";
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        try {
          var res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              category: category,
              subject: subject,
              message: message,
              email: email || undefined,
            }),
          });
          var data = await res.json().catch(function () {
            return {};
          });
          if (!res.ok) {
            throw new Error(data.error || res.statusText || "Request failed");
          }
          formWrap.hidden = true;
          successPanel.hidden = false;
        } catch (err) {
          errEl.textContent = err && err.message ? err.message : "Something went wrong. Please try again.";
          errEl.classList.add("visible");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Send feedback";
        }
      });
    })();
  </script>
  <script>
    (async () => {
      if (!window.SUPABASE_URL || !window.SUPABASE_KEY || !window.supabase) return;
      const client = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
      const { data: { session } } = await client.auth.getSession();
      if (!session) return;

      const email = session.user.email;

      // Hide Log in and Get started
      const navLogin = document.querySelector('a[href="/login"]');
      const navGetStarted = document.querySelector('a[href="/signup"]');
      if (navLogin) navLogin.style.display = 'none';
      if (navGetStarted) navGetStarted.style.display = 'none';

      // Add email + Dashboard button to nav
      const nav = document.querySelector('.nav-links') ?? document.querySelector('nav');
      if (nav) {
        const emailSpan = document.createElement('span');
        emailSpan.textContent = email;
        emailSpan.style.cssText = 'font-size:0.8rem;color:var(--text-muted);margin-right:0.5rem';
        const dashBtn = document.createElement('a');
        dashBtn.href = '/app';
        dashBtn.className = 'btn btn-primary';
        dashBtn.textContent = 'Dashboard →';
        nav.appendChild(emailSpan);
        nav.appendChild(dashBtn);
      }
    })();
  </script>
</body>
</html>
