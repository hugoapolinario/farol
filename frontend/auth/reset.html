<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/frontend/assets/favicon.svg">
  <link rel="icon" type="image/png" href="/frontend/assets/favicon.png">
  <title>Farol — Reset password</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --bg-deep: #0a0b0d;
      --bg-surface: #111318;
      --bg-elevated: #181b22;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --text-muted: #8b919d;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.14);
      --accent-glow: rgba(249, 115, 22, 0.35);
      --error: #fda4af;
      --error-bg: rgba(244, 63, 94, 0.12);
      --success: #86efac;
      --success-bg: rgba(34, 197, 94, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 40%, rgba(249, 115, 22, 0.06), transparent 50%),
        var(--bg-deep);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      color-scheme: dark;
    }

    .wrap { width: min(100% - 2rem, 1120px); margin-inline: auto; }

    .navbar {
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 13, 0.82);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .nav-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .navbar .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0;
    }

    .navbar .nav-logo:hover { color: var(--text); }

    .auth-shell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color 0.15s ease;
    }

    .back-link:hover { color: var(--text); }

    .card {
      width: min(100%, 420px);
      padding: 1.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(165deg, var(--bg-surface) 0%, var(--bg-deep) 100%);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
      color: #0a0b0d;
    }

    h1 {
      margin: 0 0 1.1rem;
      font-size: 1.45rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    form {
      display: grid;
      gap: 0.72rem;
    }

    form.hidden {
      display: none;
    }

    label {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 0.28rem;
      display: inline-block;
    }

    input {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      padding: 0.72rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      margin-top: 0.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #0a0b0d;
      font-size: 0.93rem;
      font-weight: 700;
      font-family: inherit;
      padding: 0.72rem 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      background: #fb923c;
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      min-height: 1.2rem;
      margin-top: 0.2rem;
      color: var(--error);
      font-size: 0.86rem;
      background: transparent;
      border-radius: var(--radius-sm);
      padding: 0;
    }

    .error.visible {
      padding: 0.55rem 0.65rem;
      background: var(--error-bg);
      border: 1px solid rgba(244, 63, 94, 0.25);
    }

    .success {
      display: none;
      margin-top: 0.2rem;
      color: var(--success);
      font-size: 0.86rem;
      border-radius: var(--radius-sm);
      padding: 0.55rem 0.65rem;
      background: var(--success-bg);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .success.visible {
      display: block;
    }

    .auth-link {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="wrap nav-inner">
      <a href="/" class="nav-logo" aria-label="Farol home">
        <img src="/frontend/assets/logo.svg" alt="Farol" height="28" style="display:block;">
      </a>
    </div>
  </header>

  <div class="auth-shell">
  <main class="card" aria-labelledby="reset-title">
    <a class="back-link" href="/">← Back to home</a>

    <h1 id="reset-title">Reset your password</h1>

    <form id="reset-form" novalidate>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAADB5sIzpoi_ulz7Y"></div>

      <button class="btn" type="submit" id="reset-btn">Send reset link</button>
      <p id="error-message" class="error" role="alert" aria-live="polite"></p>
    </form>

    <p id="success-message" class="success" role="status" aria-live="polite">Check your email for a reset link</p>

    <p class="auth-link"><a href="/login">Back to login</a></p>
  </main>
  </div>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

    const form = document.getElementById("reset-form");
    const errorMessage = document.getElementById("error-message");
    const successMessage = document.getElementById("success-message");
    const submitButton = document.getElementById("reset-btn");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      errorMessage.textContent = "";
      errorMessage.classList.remove("visible");
      successMessage.classList.remove("visible");

      const email = document.getElementById("email").value.trim();

      const captchaToken =
        typeof turnstile !== "undefined" ? turnstile.getResponse() : "";
      if (!captchaToken) {
        errorMessage.textContent = "Please complete the captcha";
        errorMessage.classList.add("visible");
        return;
      }

      submitButton.disabled = true;

      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: "https://usefarol.dev/update-password.html"
      });

      submitButton.disabled = false;

      if (error) {
        if (typeof turnstile !== "undefined") turnstile.reset();
        errorMessage.textContent = error.message;
        errorMessage.classList.add("visible");
        return;
      }

      form.classList.add("hidden");
      successMessage.classList.add("visible");
    });
  </script>
</body>
</html>
