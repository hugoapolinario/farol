<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/frontend/assets/favicon.svg">
  <link rel="icon" type="image/png" href="/frontend/assets/favicon.png">
  <title>Farol — Login</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --bg-deep: #0a0b0d;
      --bg-surface: #111318;
      --bg-elevated: #181b22;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --text-muted: #8b919d;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.14);
      --accent-glow: rgba(249, 115, 22, 0.35);
      --error: #fda4af;
      --error-bg: rgba(244, 63, 94, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 40%, rgba(249, 115, 22, 0.06), transparent 50%),
        var(--bg-deep);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      color-scheme: dark;
    }

    .wrap { width: min(100% - 2rem, 1120px); margin-inline: auto; }

    .navbar {
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 13, 0.82);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .nav-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .navbar .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0;
    }

    .navbar .nav-logo:hover { color: var(--text); }

    .auth-shell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color 0.15s ease;
    }

    .back-link:hover { color: var(--text); }

    .card {
      width: min(100%, 420px);
      padding: 1.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(165deg, var(--bg-surface) 0%, var(--bg-deep) 100%);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
      color: #0a0b0d;
    }

    h1 {
      margin: 0 0 1.1rem;
      font-size: 1.45rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    form {
      display: grid;
      gap: 0.72rem;
    }

    label {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 0.28rem;
      display: inline-block;
    }

    input {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      padding: 0.72rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      margin-top: 0.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #0a0b0d;
      font-size: 0.93rem;
      font-weight: 700;
      font-family: inherit;
      padding: 0.72rem 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      background: #fb923c;
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      min-height: 1.2rem;
      margin-top: 0.2rem;
      color: var(--error);
      font-size: 0.86rem;
      background: transparent;
      border-radius: var(--radius-sm);
      padding: 0;
    }

    .error.visible {
      padding: 0.55rem 0.65rem;
      background: var(--error-bg);
      border: 1px solid rgba(244, 63, 94, 0.25);
    }

    .auth-link {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    .social-login { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
    .btn-social { display: flex; align-items: center; justify-content: center; gap: 0.6rem; width: 100%; padding: 0.65rem 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); font-size: 0.9rem; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .btn-social:hover { background: var(--bg-card); border-color: var(--text-muted); }
    .social-divider { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; color: var(--text-muted); font-size: 0.8rem; }
    .social-divider::before, .social-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="wrap nav-inner">
      <a href="/" class="nav-logo" aria-label="Farol home">
        <img src="/frontend/assets/logo.svg" alt="Farol" height="28" style="display:block;">
      </a>
    </div>
  </header>

  <div class="auth-shell">
  <main class="card" aria-labelledby="login-title">
    <a class="back-link" href="/">← Back to home</a>

    <div class="social-login">
      <button class="btn-social btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <button class="btn-social btn-github" id="github-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>
    </div>
    <div class="social-divider"><span>or</span></div>

    <h1 id="login-title">Welcome back</h1>

    <form id="login-form" novalidate>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAADB5sIzpoi_ulz7Y"></div>

      <button class="btn" type="submit" id="login-btn">Log in</button>
      <a href="/reset" style="font-size:0.8rem;color:#666;text-decoration:none;display:block;text-align:center;margin-top:0.75rem;">Forgot password?</a>
      <p id="error-message" class="error" role="alert" aria-live="polite"></p>
    </form>

    <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
  </main>
  </div>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

    const form = document.getElementById("login-form");
    const errorMessage = document.getElementById("error-message");
    const submitButton = document.getElementById("login-btn");

    document.getElementById('google-btn').addEventListener('click', async () => {
      await client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://usefarol.dev/app' }
      });
    });

    document.getElementById('github-btn').addEventListener('click', async () => {
      await client.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: 'https://usefarol.dev/app' }
      });
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      errorMessage.textContent = "";
      errorMessage.classList.remove("visible");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const captchaToken =
        typeof turnstile !== "undefined" ? turnstile.getResponse() : "";
      if (!captchaToken) {
        errorMessage.textContent = "Please complete the captcha";
        errorMessage.classList.add("visible");
        return;
      }

      submitButton.disabled = true;

      const { error } = await client.auth.signInWithPassword({
        email: email,
        password: password
      });

      submitButton.disabled = false;

      if (error) {
        if (typeof turnstile !== "undefined") turnstile.reset();
        errorMessage.textContent = error.message;
        errorMessage.classList.add("visible");
        return;
      }

      window.location.href = "/app";
    });
  </script>
</body>
</html>
