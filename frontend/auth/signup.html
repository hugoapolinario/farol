<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farol — Sign up</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    :root {
      --bg-deep: #0a0b0d;
      --bg-surface: #111318;
      --bg-elevated: #181b22;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --text-muted: #8b919d;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.14);
      --accent-glow: rgba(249, 115, 22, 0.35);
      --error: #fda4af;
      --error-bg: rgba(244, 63, 94, 0.12);
      --success: #4ade80;
      --success-dim: rgba(74, 222, 128, 0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 40%, rgba(249, 115, 22, 0.06), transparent 50%),
        var(--bg-deep);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      color-scheme: dark;
    }

    .wrap {
      width: min(100% - 2rem, var(--max));
      margin-inline: auto;
    }

    .navbar {
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 13, 0.82);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .nav-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .navbar .logo {
      margin-bottom: 0;
      text-decoration: none;
      color: var(--text);
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .navbar .logo:hover {
      color: var(--text);
    }

    .navbar .logo:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .auth-shell {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .navbar .logo-mark {
      width: 32px;
      height: 32px;
    }

    .navbar .logo-mark svg {
      width: 18px;
      height: 18px;
    }

    .card {
      width: min(100%, 420px);
      padding: 1.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(165deg, var(--bg-surface) 0%, var(--bg-deep) 100%);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card .logo {
      margin-bottom: 1rem;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
      color: #0a0b0d;
    }

    h1 {
      margin: 0 0 1.1rem;
      font-size: 1.45rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    form {
      display: grid;
      gap: 0.72rem;
    }

    label {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 0.28rem;
      display: inline-block;
    }

    input {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      padding: 0.72rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      margin-top: 0.25rem;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #0a0b0d;
      font-size: 0.93rem;
      font-weight: 700;
      font-family: inherit;
      padding: 0.72rem 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .btn:hover {
      background: #fb923c;
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      min-height: 1.2rem;
      margin-top: 0.2rem;
      color: var(--error);
      font-size: 0.86rem;
      background: transparent;
      border-radius: var(--radius-sm);
      padding: 0;
    }

    .error.visible {
      padding: 0.55rem 0.65rem;
      background: var(--error-bg);
      border: 1px solid rgba(244, 63, 94, 0.25);
    }

    .auth-link {
      margin-top: 1rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    .trial-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      margin: 0.55rem 0 0;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    .success-panel[hidden] {
      display: none !important;
    }

    .success-card {
      border: 1px solid rgba(74, 222, 128, 0.42);
      border-radius: var(--radius-sm);
      background: linear-gradient(
        165deg,
        rgba(74, 222, 128, 0.12) 0%,
        var(--success-dim) 100%
      );
      padding: 1.15rem 1.05rem 1.05rem;
      margin-bottom: 0.25rem;
    }

    .success-card-icon {
      width: 44px;
      height: 44px;
      margin-bottom: 0.75rem;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.18);
      border: 1px solid rgba(74, 222, 128, 0.35);
      display: grid;
      place-items: center;
    }

    .success-card-icon svg {
      width: 22px;
      height: 22px;
      color: var(--success);
    }

    .success-lead {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text);
    }

    .success-lead strong {
      color: #bbf7d0;
      font-weight: 700;
    }

    .success-email {
      font-weight: 600;
      color: #e8eaef;
      word-break: break-all;
    }

    .success-spam-note {
      margin: 0;
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color 0.15s ease;
    }

    .back-link:hover { color: var(--text); }

    .social-login { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
    .btn-social { display: flex; align-items: center; justify-content: center; gap: 0.6rem; width: 100%; padding: 0.65rem 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); font-size: 0.9rem; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .btn-social:hover { background: var(--bg-card); border-color: var(--text-muted); }
    .social-divider { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; color: var(--text-muted); font-size: 0.8rem; }
    .social-divider::before, .social-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="wrap nav-inner">
      <a class="logo" href="/" aria-label="Farol home">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M12 3L4 9v12h16V9l-8-6z"></path>
            <path d="M9 21V12h6v9"></path>
            <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"></circle>
          </svg>
        </span>
        Farol
      </a>
    </div>
  </header>

  <div class="auth-shell">
  <main class="card" aria-labelledby="signup-title">
    <a class="back-link" href="/">← Back to home</a>

    <div id="signup-phase">
      <div class="social-login">
        <button class="btn-social btn-google" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
        <button class="btn-social btn-github" id="github-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>
      <div class="social-divider"><span>or</span></div>

      <h1 id="signup-title">Create your account</h1>

      <form id="signup-form" novalidate>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required>
        </div>
        <div>
          <label for="confirm-password">Confirm password</label>
          <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required>
        </div>

        <div class="h-captcha" data-sitekey="8190d258-7764-4c3e-b62e-317a0a64738e" data-theme="dark"></div>

        <button class="btn" type="submit" id="signup-btn">Sign up</button>
        <p id="error-message" class="error" role="alert" aria-live="polite"></p>
      </form>
    </div>

    <div id="success-panel" class="success-panel" hidden aria-live="polite">
      <div class="success-card">
        <div class="success-card-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"></path>
          </svg>
        </div>
        <p class="success-lead" id="success-lead-text"></p>
        <p class="success-spam-note">Didn't receive it? Check your spam folder.</p>
      </div>
    </div>

    <p class="auth-link" id="signup-auth-link">Already have an account? <a href="/login">Log in</a></p>
  </main>
  </div>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

    const signupPhase = document.getElementById("signup-phase");
    const successPanel = document.getElementById("success-panel");
    const successLeadText = document.getElementById("success-lead-text");
    const signupAuthLink = document.getElementById("signup-auth-link");
    const form = document.getElementById("signup-form");
    const errorMessage = document.getElementById("error-message");
    const submitButton = document.getElementById("signup-btn");

    document.getElementById('google-btn').addEventListener('click', async () => {
      await client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://usefarol.dev/app' }
      });
    });

    document.getElementById('github-btn').addEventListener('click', async () => {
      await client.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: 'https://usefarol.dev/app' }
      });
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      errorMessage.textContent = "";
      errorMessage.classList.remove("visible");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (password !== confirmPassword) {
        errorMessage.textContent = "Passwords do not match.";
        errorMessage.classList.add("visible");
        return;
      }

      const captchaToken =
        typeof hcaptcha !== "undefined" ? hcaptcha.getResponse() : "";
      if (!captchaToken) {
        errorMessage.textContent = "Please complete the captcha";
        errorMessage.classList.add("visible");
        return;
      }

      submitButton.disabled = true;

      const { error } = await client.auth.signUp({
        email: email,
        password: password,
        options: {
          captchaToken: captchaToken,
          emailRedirectTo: "https://usefarol.dev/confirmed.html"
        }
      });

      submitButton.disabled = false;

      if (error) {
        errorMessage.textContent = error.message;
        errorMessage.classList.add("visible");
        return;
      }

      successLeadText.innerHTML = "";
      const strong = document.createElement("strong");
      strong.textContent = "Check your email";
      successLeadText.appendChild(strong);
      successLeadText.appendChild(
        document.createTextNode(
          " — We've sent a confirmation link to "
        )
      );
      const emailSpan = document.createElement("span");
      emailSpan.className = "success-email";
      emailSpan.textContent = email;
      successLeadText.appendChild(emailSpan);
      successLeadText.appendChild(
        document.createTextNode(". Click it to activate your account.")
      );

      signupPhase.hidden = true;
      signupAuthLink.hidden = true;
      successPanel.hidden = false;
    });
  </script>
</body>
</html>
