<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farol — Email confirmed</title>
  <style>
    :root {
      --bg-deep: #0a0b0d;
      --bg-surface: #111318;
      --bg-elevated: #181b22;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaef;
      --text-muted: #8b919d;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.14);
      --accent-glow: rgba(249, 115, 22, 0.35);
      --success: #4ade80;
      --success-dim: rgba(74, 222, 128, 0.16);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(249, 115, 22, 0.12), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 40%, rgba(249, 115, 22, 0.06), transparent 50%),
        var(--bg-deep);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      color-scheme: dark;
    }

    .card {
      width: min(100%, 420px);
      padding: 1.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(165deg, var(--bg-surface) 0%, var(--bg-deep) 100%);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
      font-size: 1.02rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #ea580c);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
      color: #0a0b0d;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      margin: 0 0 1rem;
      border-radius: 50%;
      background: var(--success-dim);
      border: 1px solid rgba(74, 222, 128, 0.35);
      display: grid;
      place-items: center;
    }

    .success-icon svg {
      width: 28px;
      height: 28px;
      color: var(--success);
    }

    h1 {
      margin: 0 0 0.65rem;
      font-size: 1.45rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtext {
      margin: 0 0 1rem;
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .countdown {
      margin: 0 0 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      min-height: 1.4rem;
    }

    .auth-link {
      margin: 0;
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="confirmed-title">
    <div class="logo" aria-label="Farol">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 3L4 9v12h16V9l-8-6z"></path>
          <path d="M9 21V12h6v9"></path>
          <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"></circle>
        </svg>
      </span>
      Farol
    </div>

    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </div>

    <h1 id="confirmed-title">Email confirmed!</h1>
    <p class="subtext">Your account is ready. Redirecting to login...</p>
    <p class="countdown" id="countdown" aria-live="polite">Redirecting in 3...</p>
    <p class="auth-link"><a href="/login.html">Go to login now</a></p>
  </main>

  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

    const countdownEl = document.getElementById("countdown");
    let remaining = 3;

    const timer = setInterval(function () {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(timer);
        window.location.href = "/login.html";
        return;
      }
      countdownEl.textContent = "Redirecting in " + remaining + "...";
    }, 1000);
  </script>
</body>
</html>
